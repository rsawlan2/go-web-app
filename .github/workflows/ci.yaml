name: CI

on:
  push:
    branches:
      - main
    path-ignore:
      - "Readme.md"
      - 'helm/**'      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: '1.22'

    - name: Build the application
      run: go build -o go-web-app

    - name: Run tests
      run: go test ./...

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.56.2
  
  push-to-registry:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout repository 
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v3
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/go-web-app:${{ github.run_id }}

  update-new-tag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push-to-registry

    steps:
    - name: Checkout repository 
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update image tag in Helm chart
      run: |
        sed -i "s/tag: .*/tag: "${{ github.run_id }}"/" helm/go-web-app-chart/values.yaml

    - name: Commit and push changes
      run: |    
        git config --global user.name "rsawlan2"
        git config --global user.email "roma.sawlani92@gmail.com"
        git add helm/go-web-app-chart/values.yaml
        git commit -m "Update image tag in Helm chart"
        git push